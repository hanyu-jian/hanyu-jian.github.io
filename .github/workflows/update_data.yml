name: Daily Energy Data Update
on:
  schedule:
    - cron: "0 6 * * *"   # 每天 UTC 06:00
  workflow_dispatch:       # 手动触发（有 fix_only 选项）
    inputs:
      fix_only:
        description: "只跑数据修复（fix_csv.py），不更新新数据"
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install pandas requests

      # ── 正常数据更新（fix_only=true 时跳过）────────────────────────
      - name: Run update script
        if: ${{ github.event.inputs.fix_only != 'true' }}
        run: python update_data.py

      # ── 修复精度（每次都跑，确保新下载的数据也是干净的）────────────
      - name: Fix CSV precision & types
        run: python fix_csv.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || \
            git commit -m "chore: auto update energy data $(date -u +'%Y-%m-%d')"
          git push
