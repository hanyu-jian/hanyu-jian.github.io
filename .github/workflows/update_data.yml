name: Daily Energy Data Update
on:
  schedule:
    - cron: "0 6 * * *"   # 每天 UTC 06:00
  workflow_dispatch:
    inputs:
      full_mode:
        description: "全量拉取（初始化）"
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install pandas requests lxml

      - name: Run update script
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: |
          MODE=${{ github.event.inputs.full_mode == 'true' && 'full' || 'incremental' }}
          python fetch_entsoe.py --mode $MODE

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ raw_data/
          git diff --cached --quiet || \
            git commit -m "chore: auto update energy data $(date -u +'%Y-%m-%d')"
          git push --force-with-lease
