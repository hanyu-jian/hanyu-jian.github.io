<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>European Capacity Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background:#f5f7fa;
    margin:0;
}
.container{
    max-width:1400px;
    margin:20px auto;
    background:#fff;
    padding:20px;
}
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}
h2{
    margin:0;
    font-size:18px;
}
.range{
    display:flex;
    gap:6px;
}
select{
    padding:5px;
}
.content{
    display:flex;
    gap:20px;
}
#map{
    width:40%;
    height:600px;
}
#bar{
    width:60%;
    height:600px;
}
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
    <h2 id="title">Installed Capacity</h2>

    <div class="range">
        <select id="start"></select>
        <span>→</span>
        <select id="end"></select>
    </div>
</div>

<div class="content">
    <div id="map"></div>
    <div id="bar"></div>
</div>

</div>

<script>

const TARGET = ['AT','BG','DE','ES','FR','GR','HR','HU','IT','PL','RO','RS','SK'];

const NAME_MAP = {
    AT:'Austria', BG:'Bulgaria', DE:'Germany', ES:'Spain', FR:'France',
    GR:'Greece', HR:'Croatia', HU:'Hungary', IT:'Italy',
    PL:'Poland', RO:'Romania', RS:'Serbia', SK:'Slovakia'
};

let DATA = [];
let PERIODS = [];
let state = {
    start:null,
    end:null,
    country:null
};

async function loadData(){

    const geo = await fetch('europe.geojson').then(r=>r.json());
    echarts.registerMap('europe', geo);

    const raw = await new Promise(res=>{
        Papa.parse('data/capacity.csv',{
            download:true,
            header:true,
            complete:r=>res(r.data)
        })
    });

    DATA = raw.map(r=>({
        year:+r['Year'],
        country:r['Country'],
        type:r['Production Type'],
        mw:+r['Installed Capacity (MW)']
    })).filter(r=>TARGET.includes(r.country));

    PERIODS = [...new Set(DATA.map(r=>r.year))].sort();

    state.start = PERIODS[0];
    state.end = PERIODS[PERIODS.length-1];

    initSelectors();
    drawMap();
}

function initSelectors(){
    const s = document.getElementById('start');
    const e = document.getElementById('end');

    PERIODS.forEach(p=>{
        s.innerHTML += `<option>${p}</option>`;
        e.innerHTML += `<option>${p}</option>`;
    });

    s.value = state.start;
    e.value = state.end;

    s.onchange = ()=>{state.start = +s.value; update();}
    e.onchange = ()=>{state.end = +e.value; update();}
}

function getTotal(country){
    return DATA
        .filter(r=>r.country===country && r.year===state.end)
        .reduce((s,r)=>s+r.mw,0)/1000;
}

function drawMap(){

    const chart = echarts.init(document.getElementById('map'));

    chart.setOption({
        geo:{
            map:'europe',
            roam:false,
            itemStyle:{
                areaColor:'#dce8f5',
                borderColor:'#7aacc8'
            },
            emphasis:{
                itemStyle:{
                    areaColor:'#2c3e50'
                }
            },
            select:{
                itemStyle:{
                    areaColor:'#2c3e50'
                }
            }
        },
        series:[{
            type:'map',
            map:'europe',
            data: TARGET.map(cc=>({
                name:NAME_MAP[cc],
                value:getTotal(cc),
                cc:cc
            })),
            label:{
                show:true,
                formatter:p=>{
                    if(!p.data) return '';
                    return p.data.cc + '\n' + p.value.toFixed(1)+'GW';
                },
                fontSize:9
            }
        }]
    });

    chart.on('click',p=>{
        if(!p.data) return;
        state.country = p.data.cc;
        drawBar();
        document.getElementById('title').innerText =
            'Installed Capacity — '+NAME_MAP[state.country];
    });
}

function drawBar(){

    const chart = echarts.init(document.getElementById('bar'));

    const rows = DATA.filter(r=>
        r.country===state.country &&
        r.year>=state.start &&
        r.year<=state.end
    );

    const types = [...new Set(rows.map(r=>r.type))];

    const series = types.map(t=>{
        return {
            name:t,
            type:'bar',
            stack:'x',
            data: PERIODS.map(y=>{
                const row = rows.find(r=>r.year===y && r.type===t);
                return row ? row.mw/1000 : 0;
            })
        }
    });

    const totals = PERIODS.map(y=>{
        return rows.filter(r=>r.year===y)
            .reduce((s,r)=>s+r.mw,0)/1000;
    });

    chart.setOption({
        tooltip:{
            trigger:'axis',
            formatter:p=>{
                let total = p.reduce((s,x)=>s+x.value,0);
                let html = `<b>${p[0].axisValue}</b><br/>`;
                p.forEach(i=>{
                    if(i.value>0){
                        html += `${i.seriesName}: ${i.value.toFixed(2)} GW<br/>`;
                    }
                });
                html += `<b>Total: ${total.toFixed(2)} GW</b>`;
                return html;
            }
        },
        xAxis:{type:'category',data:PERIODS},
        yAxis:{
            type:'value',
            name:'GW'
        },
        series:[
            {
                type:'bar',
                data:totals,
                label:{
                    show:true,
                    position:'top',
                    formatter:p=>p.value.toFixed(1)+' GW'
                },
                itemStyle:{color:'transparent'},
                tooltip:{show:false}
            },
            ...series
        ]
    });
}

function update(){
    drawMap();
    if(state.country) drawBar();
}

loadData();

</script>

</body>
</html>
