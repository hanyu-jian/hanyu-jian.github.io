        /* Legend */

        /* ── Right panel ── */
        .panel {
            width: 50%;

        .table-wrapper { overflow-y: auto; flex: 1; }

        th, td {

<body>
<div id="mapTip"></div>

<div class="container">
    <div class="header">
        <div class="header-top"><h1>European Electricity Dashboard</h1></div>
        <div class="main-nav">
            <a href="project.html"        class="main-nav-link active">Project</a>

        </div>
    </div>

    </div>

    <div class="content">

        <!-- Left: SVG map -->

            <div class="map-svg-wrap">
                <svg id="europeSvg" viewBox="0 0 420 480"
                     preserveAspectRatio="xMidYMid meet"></svg>
            </div>
            <div class="map-legend">
                <h4>Portfolio by Type</h4>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#f6c94e;"></div>
                    <span class="legend-label">Solar</span>
                    <span class="legend-value" id="legendSolar">0 MW</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#4ec9d4;"></div>
                    <span class="legend-label">Wind</span>
                    <span class="legend-value" id="legendWind">0 MW</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#e07b6a;"></div>
                    <span class="legend-label">Gas</span>
                    <span class="legend-value" id="legendGas">0 MW</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#9e9e9e;"></div>
                    <span class="legend-label">Fossil</span>

                </div>
                <div class="legend-item"
                     style="border-top:1px solid #eee;padding-top:7px;margin-top:3px;">
                    <div class="legend-dot" style="background:#2c3e50;"></div>
                    <span class="legend-label" style="font-weight:600;">Total</span>

        <!-- Right panel -->

                     preserveAspectRatio="xMidYMid meet"></svg>

                    <thead>

                                Click a country on the map

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const projectData = {
    Romania:    [{ name: 'Prime',     capacity: 130,  type: 'Wind',
                   status: 'Under Construction', coord: [24.9,  45.9] }],
    Hungary:    [{ name: 'Tokaj',     capacity: 197,  type: 'Solar',
                   status: 'Operating',          coord: [21.41, 48.12] },
                 { name: 'Victor',    capacity: 132,  type: 'Solar',
                   status: 'Operating',          coord: [19.04, 47.50] }],
    Serbia:     [{ name: 'Blackpeak', capacity: 156,  type: 'Wind',
                   status: 'Under Construction', coord: [20.4,  44.8]  }],
    Turkey:     [{ name: 'xxx',       capacity: 1320, type: 'Gas',
                   status: 'Operating',          coord: [32.8,  39.9]  }],
    Malta:      [{ name: 'xxx',       capacity: 152,  type: 'Fossil',
                   status: 'Operating',          coord: [14.4,  35.9]  }],
    Montenegro: [{ name: 'Mozura',    capacity: 48,   type: 'Wind',
                   status: 'Operating',          coord: [19.3,  42.4]  }]
};

/* ISO-A2 → display name (and reverse) */
const NAME_TO_ISO = {
    Romania: 'RO', Hungary: 'HU', Serbia: 'RS',
    Turkey: 'TR',  Malta: 'MT',   Montenegro: 'ME'
};
const ISO_TO_NAME = Object.fromEntries(
    Object.entries(NAME_TO_ISO).map(([n, c]) => [c, n])
);

const typeColor = {
    Solar: '#f6c94e', Wind: '#4ec9d4', Gas: '#e07b6a', Fossil: '#9e9e9e'
};
const typeBadge = {
    Solar: 'badge-solar', Wind: 'badge-wind',
    Gas: 'badge-gas',     Fossil: 'badge-fossil'
};

const TARGET_ISO = Object.values(NAME_TO_ISO); // ['RO','HU','RS','TR','MT','ME']

/* ── Legend totals ── */
(function() {
    const t = { Solar: 0, Wind: 0, Gas: 0, Fossil: 0 };
    Object.values(projectData).forEach(ps =>
        ps.forEach(p => { if (t[p.type] !== undefined) t[p.type] += p.capacity; })
    );
    document.getElementById('legendSolar').textContent  = t.Solar  + ' MW';
    document.getElementById('legendWind').textContent   = t.Wind   + ' MW';
    document.getElementById('legendGas').textContent    = t.Gas    + ' MW';
    document.getElementById('legendFossil').textContent = t.Fossil + ' MW';
    document.getElementById('legendTotal').textContent  =
        (t.Solar + t.Wind + t.Gas + t.Fossil) + ' MW';
})();

/* ═══════════════════════════════════════════
   MAP PROJECTION  (lon/lat → SVG coords)
   Covers roughly -12..42 lon, 30..62 lat
═══════════════════════════════════════════ */
const VIEW_W = 420, VIEW_H = 480;
const LON_MIN = -12, LON_MAX = 42;
const LAT_MIN = 30,  LAT_MAX = 62;

function ll2xy(lon, lat) {
    const x = (lon - LON_MIN) / (LON_MAX - LON_MIN) * VIEW_W;
    const y = (LAT_MAX - lat) / (LAT_MAX - LAT_MIN) * VIEW_H;
    return [x, y];
}

function ringToD(ring) {
    const pts = ring.map(([ln, lt]) => ll2xy(ln, lt));
    if (!pts.length) return '';
    return 'M' + pts[0][0].toFixed(1) + ',' + pts[0][1].toFixed(1)
        + pts.slice(1).map(p => 'L' + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join('')
        + 'Z';
}

function featureToD(f) {
    const g = f.geometry; if (!g) return '';
    const parts = [];
    if (g.type === 'Polygon')
        g.coordinates.forEach(r => parts.push(ringToD(r)));
    else if (g.type === 'MultiPolygon')
        g.coordinates.forEach(poly => poly.forEach(r => parts.push(ringToD(r))));
    return parts.filter(Boolean).join(' ');
}

function featureCentroid(f) {
    const g = f.geometry; if (!g) return null;
    let best = null, bestN = 0;
    const check = r => { if (r.length > bestN) { bestN = r.length; best = r; } };
    if (g.type === 'Polygon') g.coordinates.forEach(check);
    else if (g.type === 'MultiPolygon') g.coordinates.forEach(p => p.forEach(check));
    if (!best) return null;
    let sx = 0, sy = 0;
    best.forEach(([ln, lt]) => { sx += ln; sy += lt; });
    return [sx / best.length, sy / best.length];
}

function getISO(f) {
    const p = f.properties || {};
    return (p.ISO_A2 || p.iso_a2 || p.ISO2 || p.iso2 || '').toUpperCase();
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let geoFeatures = [];
let selectedISO = null;

/* ═══════════════════════════════════════════
   BUILD MAIN MAP
═══════════════════════════════════════════ */
function buildMap() {
    const svg = document.getElementById('europeSvg');

    let html = `
        <defs>
          <filter id="shad">
            <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.18"/>
          </filter>
        </defs>
        <rect width="${VIEW_W}" height="${VIEW_H}" fill="#d4e8f5"/>`;

    /* non-target countries first (background) */
    geoFeatures.forEach(f => {
        const iso = getISO(f);
        if (TARGET_ISO.includes(iso)) return;
        const d = featureToD(f);
        if (!d) return;
        html += `<path d="${d}" fill="#c8dce8" stroke="#b0c8d8"
                      stroke-width="0.5" stroke-linejoin="round"/>`;
    });

    /* target (project) countries on top */
    geoFeatures.forEach(f => {
        const iso = getISO(f);
        if (!TARGET_ISO.includes(iso)) return;
        const d = featureToD(f);
        if (!d) return;

        const name      = ISO_TO_NAME[iso];
        const isSelected = selectedISO === iso;
        const fill   = isSelected ? '#2c3e50' : '#7aafc8';
        const stroke = isSelected ? '#1a252f' : '#5a90b0';
        const sw     = isSelected ? 2 : 1.2;

        /* total MW for this country */
        const total = (projectData[name] || [])
            .reduce((s, p) => s + p.capacity, 0);
        const totalLabel = total >= 1000
            ? (total / 1000).toFixed(1) + ' GW'
            : total + ' MW';

        html += `<path d="${d}" fill="${fill}" stroke="${stroke}"
                      stroke-width="${sw}" stroke-linejoin="round"
                      filter="url(#shad)" style="cursor:pointer;"
                      onmouseenter="showTip(event,'${name}',${total})"
                      onmouseleave="hideTip()"
                      onclick="onCountryClick('${iso}')"/>`;

        /* label: ISO code + total capacity */
        const ctr = featureCentroid(f);
        if (ctr) {
            const [cx, cy] = ll2xy(ctr[0], ctr[1]);
            const tcol  = isSelected ? '#ffffff' : '#1a3a52';
            const tcol2 = isSelected ? '#a0c4dc' : '#2a5a7a';
            html += `
              <text x="${cx.toFixed(1)}" y="${(cy - 2).toFixed(1)}"
                    text-anchor="middle" font-size="8.5" font-weight="800"
                    fill="${tcol}" paint-order="stroke"
                    stroke="rgba(255,255,255,0.55)" stroke-width="2.5"
                    style="pointer-events:none;
                           font-family:'Segoe UI',sans-serif;">${iso}</text>
              <text x="${cx.toFixed(1)}" y="${(cy + 7).toFixed(1)}"
                    text-anchor="middle" font-size="7" font-weight="600"
                    fill="${tcol2}" paint-order="stroke"
                    stroke="rgba(255,255,255,0.55)" stroke-width="2"
                    style="pointer-events:none;
                           font-family:'Segoe UI',sans-serif;">${totalLabel}</text>`;
        }

        /* project dots */
        (projectData[name] || []).forEach(p => {
            const [px, py] = ll2xy(p.coord[0], p.coord[1]);
            const r = Math.max(5, Math.sqrt(p.capacity) * 0.45);
            html += `
              <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${r}"
                      fill="${typeColor[p.type] || '#888'}"
                      stroke="#fff" stroke-width="1.4"
                      style="pointer-events:none;" opacity="0.92"/>`;
        });
    });

    svg.innerHTML = html;
}

/* ═══════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════ */
function showTip(e, name, total) {
    const projects = projectData[name] || [];
    const tip = document.getElementById('mapTip');
    tip.innerHTML = `<b>${name}</b><br/>
        ${projects.length} project(s) · ${total} MW total`;
    tip.style.display = 'block';
    moveTip(e);
}
function hideTip() {
    document.getElementById('mapTip').style.display = 'none';
}
document.addEventListener('mousemove', e => {
    const tip = document.getElementById('mapTip');
    if (tip.style.display === 'block') moveTip(e);
});
function moveTip(e) {
    const tip = document.getElementById('mapTip');
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
}

/* ═══════════════════════════════════════════
   CLICK → right panel
═══════════════════════════════════════════ */
function onCountryClick(iso) {
    selectedISO = iso;
    buildMap();

    const name = ISO_TO_NAME[iso];
    document.getElementById('countryName').textContent = name;

    /* table */
    const tbody = document.getElementById('projectTable');
    const projects = projectData[name] || [];
    if (!projects.length) {
        tbody.innerHTML =
            `<tr><td colspan="4" class="empty-state">No projects in ${name}</td></tr>`;
    } else {
        tbody.innerHTML = projects.map(p => `
            <tr>
                <td>${p.name}</td>
                <td><span class="badge ${typeBadge[p.type] || ''}">${p.type}</span></td>
                <td>${p.capacity} MW</td>
                <td>${p.status}</td>
            </tr>`).join('');
    }

    /* mini map */
    buildCountryMap(name, iso);
}

/* ═══════════════════════════════════════════
   MINI MAP (right panel)
═══════════════════════════════════════════ */
function buildCountryMap(name, iso) {
    const SVG_W = 340, SVG_H = 220;
    const PAD = 20;

    /* find the feature */
    const feat = geoFeatures.find(f => getISO(f) === iso);
    const svg  = document.getElementById('countryMapSvg');

    if (!feat) { svg.innerHTML = ''; return; }

    /* collect all coords to find bounding box */
    const g = feat.geometry;
    let allCoords = [];
    const collect = ring => ring.forEach(c => allCoords.push(c));
    if (g.type === 'Polygon') g.coordinates.forEach(collect);
    else if (g.type === 'MultiPolygon')
        g.coordinates.forEach(poly => poly.forEach(collect));

    if (!allCoords.length) { svg.innerHTML = ''; return; }

    const lons = allCoords.map(c => c[0]);
    const lats = allCoords.map(c => c[1]);
    const lonMin = Math.min(...lons), lonMax = Math.max(...lons);
    const latMin = Math.min(...lats), latMax = Math.max(...lats);

    /* scale to fit with padding */
    const scaleX = (SVG_W - PAD * 2) / (lonMax - lonMin || 1);
    const scaleY = (SVG_H - PAD * 2) / (latMax - latMin || 1);
    const scale  = Math.min(scaleX, scaleY);

    const offX = PAD + ((SVG_W - PAD * 2) - (lonMax - lonMin) * scale) / 2;
    const offY = PAD + ((SVG_H - PAD * 2) - (latMax - latMin) * scale) / 2;

    function proj(lon, lat) {
        return [
            offX + (lon - lonMin) * scale,
            offY + (latMax - lat) * scale
        ];
    }

    function miniRingToD(ring) {
        const pts = ring.map(([ln, lt]) => proj(ln, lt));
        if (!pts.length) return '';
        return 'M' + pts[0][0].toFixed(1) + ',' + pts[0][1].toFixed(1)
            + pts.slice(1).map(p => 'L' + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join('')
            + 'Z';
    }

    /* also draw neighbouring countries for context */
    let bgPaths = '';
    geoFeatures.forEach(f => {
        if (getISO(f) === iso) return;
        /* rough bounding-box filter: only neighbours */
        const fc = f.geometry; if (!fc) return;
        let fc_coords = [];
        const fc_collect = r => r.forEach(c => fc_coords.push(c));
        if (fc.type === 'Polygon') fc.coordinates.forEach(fc_collect);
        else if (fc.type === 'MultiPolygon')
            fc.coordinates.forEach(p => p.forEach(fc_collect));
        if (!fc_coords.length) return;

        const fLons = fc_coords.map(c => c[0]);
        const fLats = fc_coords.map(c => c[1]);
        const fLonMin = Math.min(...fLons), fLonMax = Math.max(...fLons);
        const fLatMin = Math.min(...fLats), fLatMax = Math.max(...fLats);

        /* skip if doesn't overlap extended bbox */
        const EXT = 4; // degrees of context
        if (fLonMax < lonMin - EXT || fLonMin > lonMax + EXT ||
            fLatMax < latMin - EXT || fLatMin > latMax + EXT) return;

        const gd = fc.type === 'Polygon'
            ? fc.coordinates.map(miniRingToD).join(' ')
            : fc.coordinates.map(poly => poly.map(miniRingToD).join(' ')).join(' ');

        if (gd.trim()) {
            bgPaths += `<path d="${gd}" fill="#c8dce8"
                              stroke="#b0c8d8" stroke-width="0.5"/>`;
        }
    });

    /* main country path */
    let mainD = '';
    if (g.type === 'Polygon')
        mainD = g.coordinates.map(miniRingToD).join(' ');
    else if (g.type === 'MultiPolygon')
        mainD = g.coordinates.map(poly => poly.map(miniRingToD).join(' ')).join(' ');

    /* project dots */
    let dots = '';
    (projectData[name] || []).forEach(p => {
        const [px, py] = proj(p.coord[0], p.coord[1]);
        const r = 6;
        dots += `
          <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${r}"
                  fill="${typeColor[p.type] || '#888'}"
                  stroke="#fff" stroke-width="1.5"/>
          <text x="${(px + 9).toFixed(1)}" y="${(py + 4).toFixed(1)}"
                font-size="9" font-weight="600" fill="#2c3e50"
                style="font-family:'Segoe UI',sans-serif;">${p.name}</text>`;
    });

    svg.innerHTML = `
        <rect width="${SVG_W}" height="${SVG_H}" fill="#d4e8f5"/>
        ${bgPaths}
        <path d="${mainD}" fill="#7aafc8" stroke="#5a90b0"
              stroke-width="1.2" stroke-linejoin="round"/>
        ${dots}`;
}

/* ═══════════════════════════════════════════
   LOAD GeoJSON → build map
═══════════════════════════════════════════ */
fetch('europe.geojson')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(geo => {
        geoFeatures = geo.features || [];
        buildMap();
    })
    .catch(err => {
        console.error(err);
        document.getElementById('europeSvg').innerHTML =
            `<text x="20" y="40" fill="#c0392b" font-size="13">
               ❌ Could not load europe.geojson
             </text>`;
    });
</script>
