name: Daily Energy Data Update

on:
  schedule:
    - cron: "0 6 * * *"   # 每天 UTC 06:00
  workflow_dispatch:
    inputs:
      fix_only:
        description: "只跑数据修复（fix_csv.py），不更新新数据"
        type: boolean
        default: false
      full_mode:
        description: "全量拉取（初始化用，从 2023-01-01 开始）"
        type: boolean
        default: false
      script:
        description: "运行哪个脚本"
        type: choice
        options:
          - both
          - entsoe_only
          - intraday_only
        default: both

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install pandas requests lxml

      # ─────────────────────────────────────────────
      - name: Run update script
        if: ${{ github.event.inputs.fix_only != 'true' }}
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: |
          MODE=${{ github.event.inputs.full_mode == 'true' && 'full' || 'incremental' }}
          SCRIPT=${{ github.event.inputs.script || 'both' }}

          if [ "$SCRIPT" != "intraday_only" ]; then
            python fetch_entsoe.py --mode $MODE
          fi
          if [ "$SCRIPT" != "entsoe_only" ]; then
            python fetch_intraday.py --mode $MODE
          fi

      # ────────────────────────────────────
      - name: Fix CSV precision & types
        run: python fix_csv.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || \
            git commit -m "chore: auto update energy data $(date -u +'%Y-%m-%d')"
          git push
