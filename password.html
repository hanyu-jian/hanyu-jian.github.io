<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 380px;
            text-align: center;
        }

        .lock { font-size: 56px; margin-bottom: 16px; }

        h2 {
            color: #2c3e50;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e4e9;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 16px;
            color: #2c3e50;
        }

        input:focus { border-color: #2c3e50; }

        button {
            width: 100%;
            padding: 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #1e2b38; }

        .error {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 14px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="lock">🔒</div>
    <h2>Access Required</h2>
    <p class="subtitle">Please enter the password to continue</p>
    <input
        type="password"
        id="passwordInput"
        placeholder="Enter password"
        onkeypress="if(event.key==='Enter') checkPassword()"
        autofocus
    >
    <button onclick="checkPassword()">Enter</button>
    <p class="error" id="errorMsg">❌ Incorrect password. Please try again.</p>
</div>

<script>
    // input password
    const CORRECT_PASSWORD = "pingu";

    // 
    if (localStorage.getItem('site_access') === 'granted') {
        window.location.replace('/');
    }

    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        const errorMsg = document.getElementById('errorMsg');

        if (input === CORRECT_PASSWORD) {
            localStorage.setItem('site_access', 'granted');
            window.location.replace('/');
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }
    }
</script>
</body>
</html>
